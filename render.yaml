# Render Blueprint — deploys the Strapi CMS (cms/) + a managed PostgreSQL.
# Usage: in the Render dashboard, "New +" → "Blueprint" → connect the
# TurkeyAbdo/news-1 repo. Render reads this file and provisions everything.
# After the first deploy, set PUBLIC_URL to the service's URL and redeploy.

databases:
  - name: news-cms-db
    plan: free
    databaseName: news_cms
    user: strapi

services:
  - type: web
    name: news-cms
    runtime: node
    plan: free
    rootDir: cms
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /_health
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: news-cms-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "1337"
      # Set this to the service URL (e.g. https://news-cms.onrender.com) after first deploy
      - key: PUBLIC_URL
        sync: false
      - key: IS_PROXIED
        value: "true"
      - key: STRAPI_TELEMETRY_DISABLED
        value: "true"
      # Cloudinary media storage — set these in the Render dashboard so uploads
      # persist (Render's disk is wiped on restart). From cloudinary.com/console.
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_KEY
        sync: false
      - key: CLOUDINARY_SECRET
        sync: false
      # Secrets — Render generates secure random values automatically
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
